services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pycoach
      POSTGRES_USER: pycoach
      POSTGRES_PASSWORD: pycoach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pycoach -d pycoach"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://pycoach:pycoach@postgres:5432/pycoach
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-75}
      LLM_EXTRA_BODY: ${LLM_EXTRA_BODY:-}
      CURRICULUM_DIR: /app/curriculum/python_iterator_v1
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    ports:
      - "8000:8000"

  web:
    build:
      context: apps/web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
